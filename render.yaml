services:
  # Backend API (FastAPI)
  - type: web
    name: resume-analyzer-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: GEMINI_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: resume_analyzer
      - key: MONGODB_COLLECTION
        value: role_cache
      - key: MONGODB_MASTER_COLLECTION
        value: role_skills_master
      - key: ROLE_CACHE_TTL_DAYS
        value: "30"
      - key: ROLE_CACHE_FAILURE_TTL_MINUTES
        value: "15"

  # Frontend (Streamlit)
  - type: web
    name: resume-analyzer-ui
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run streamlit_app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: BACKEND_URL
        value: https://resume-analyzer-e6s3.onrender.com
